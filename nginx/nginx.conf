user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 日志格式
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    # ==================== Gzip 压缩配置 ====================
    gzip  on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/atom+xml
        application/geo+json
        application/vnd.ms-fontobject
        application/x-font-ttf
        application/x-web-app-manifest+json
        font/opentype
        image/svg+xml
        image/x-icon;

    server {
        listen       80;
        server_name  localhost;

        # 网站根目录（与 Dockerfile 中 COPY 的目标路径对应）
        root   /usr/share/nginx/html;
        index  index.html;

        # ==================== 安全响应头 ====================
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # 如需 HTTPS 严格传输安全，取消注释以下行（仅 HTTPS 环境）
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ==================== 静态资源缓存策略 ====================
        # JS / CSS / 字体 / 图片：构建产物带 hash，长期缓存
        location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|gif|webp)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
        }

        # HTML 文件：不缓存，保证更新立即生效
        location ~* \.html$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            expires 0;
        }

        # ==================== SPA History 路由支持 ====================
        # 所有未匹配到静态文件的请求都返回 index.html，由前端路由接管
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ==================== 反向代理后端 API（可选，按需开启） ====================
        # 如果需要在容器内代理后端接口，取消以下注释并修改 target 地址
        # location /api/ {
        #     proxy_pass         http://backend-service:3000/;
        #     proxy_http_version 1.1;
        #     proxy_set_header   Upgrade $http_upgrade;
        #     proxy_set_header   Connection 'upgrade';
        #     proxy_set_header   Host $host;
        #     proxy_set_header   X-Real-IP $remote_addr;
        #     proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header   X-Forwarded-Proto $scheme;
        #     proxy_cache_bypass $http_upgrade;
        # }

        # ==================== 错误页 ====================
        error_page  404              /index.html;
        error_page  500 502 503 504  /50x.html;
        location = /50x.html {
            root  /usr/share/nginx/html;
        }
    }
}
